name: Deploy Infrastructure (Bicep)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - test
          - staging
          - prod
      resource-group:
        description: Target resource group name
        required: true
        type: string
      base-name:
        description: "Base name for resources (default: cicd-demo)"
        required: false
        default: cicd-demo
        type: string

jobs:
  deploy-infra:
    name: Deploy Bicep → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: |
          az bicep build --file infra/main.bicep
          az deployment group validate \
            --resource-group "${{ inputs.resource-group }}" \
            --template-file infra/main.bicep \
            --parameters environment="${{ inputs.environment }}" baseName="${{ inputs.base-name }}"

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "${{ inputs.resource-group }}" \
            --template-file infra/main.bicep \
            --parameters environment="${{ inputs.environment }}" baseName="${{ inputs.base-name }}" \
            --name "infra-${{ inputs.environment }}-${{ github.run_number }}"
